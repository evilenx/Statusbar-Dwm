name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev \
          libxft-dev \
          libxinerama-dev \
          libpulse-dev \
          libgtk-4-dev \
          pkg-config

    - name: Build statusbar
      run: cargo build --verbose

    - name: Build volume-mixer
      run: cargo build --verbose --manifest-path volume-mixer/Cargo.toml
